{% extends "base.html" %}
{% block title %}Вхід{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card p-4">
      <h3 class="mb-4"><i class="bi bi-box-arrow-in-right"></i> Вхід у систему</h3>
      <form method="post">
        <input type="hidden" name="next" value="{{ next }}">
        <div class="mb-3">
          <label class="form-label fw-bold">Ім'я користувача</label>
          <input type="text" class="form-control" name="username" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Пароль</label>
          <input type="password" class="form-control" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Увійти</button>
      </form>
      <hr>
      <p class="text-center mb-0">Немає акаунту? <a href="{{ url_for('auth.register') }}">Зареєструватись</a></p>
    </div>
  </div>
</div>
{% endblock %}
