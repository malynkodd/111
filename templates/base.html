<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>{{ title if title else "Expert Decision Support" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="topbar">
  <div class="wrap">
    <h1>Вебсистема підтримки колективного прийняття рішень</h1>
    <nav>
      <a href="{{ url_for('index') }}">Головна</a>
      <a href="{{ url_for('create_session') }}">Нова сесія</a>
    </nav>
  </div>
</header>
<main class="wrap">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash">{{ messages[0] }}</div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
